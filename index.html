<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bem vindo</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body, html {
      height: 100%;
      margin: 0;
      background-color: #0a0a0a; /* preto bem escuro */
      color: white;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      padding: 0 20px;
    }
    h1 {
      font-weight: 700;
      text-align: center;
      margin-bottom: 2rem;
    }
    .form-select {
      background-color: #222; /* fundo escuro para select */
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
    }
    .form-select:focus {
      box-shadow: none;
      border-color: #5a87ff;
      outline: none;
    }
    .info-text {
      text-align: center;
      margin: 2rem 0 3rem 0;
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.4;
    }
    .btn-primary {
      background-color: #5a87ff;
      border: none;
      border-radius: 50px;
      padding: 0.75rem 0;
      font-weight: 500;
      font-size: 1.1rem;
      box-shadow: 0 0 10px #5a87ff66;
      transition: background-color 0.3s ease;
    }
    .btn-primary:hover {
      background-color: #4071ff;
      box-shadow: 0 0 15px #4071ffaa;
    }
    .main {
        display: flex;
        flex-direction: column;
        flex-grow: 0.7;
        justify-content: center;
        gap: 8vh;
    }

    .footer {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 8vh;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="main">
        <h1>Bem vindo!</h1>

        <select class="form-select w-100" aria-label="Tipo de usuário">
        <option selected>Escolha seu tipo de usuário</option>
        <option value="jogador">Jogador</option>
        <option value="clube">Clube</option>
        <option value="investidor">Investidor</option>
        </select>
    </div>

    <div class="footer">
        <p class="info-text">
          Lembre-se que isso define seu futuro!<br />
          Vamos juntos
        </p>
        <button type="button" class="btn btn-primary w-100">PRÓXIMO</button>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
  ></script>
</body>
</html>
